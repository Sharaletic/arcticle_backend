services:
  article-postgres:
    image: postgres:18.4-bookworm
    container_name: article-env-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./out/pgdata:/var/lib/postgresql
    restart: always

  article-postgres-migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ./migrations:/migrations

  port-forwarder:
    image: alpine/socat:1.8.1.1
    container_name: article-postgres-port-forwarder
    command: tcp-listen:5432,fork,reuseaddr tcp-connect:article-postgres:5432
    ports:
      - "127.0.0.1:5432:5432"
